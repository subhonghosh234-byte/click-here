<!DOCTYPE html>
<html>
<head>
<title>Special Question ❤️</title>

<style>
body{
    text-align:center;
    font-family:Arial;
    background:#ffd6e7;
    margin-top:150px;
}

h1{
    color:#ff3366;
    font-size:40px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    margin:20px;
}

#yes{
    background:#ff3366;
    color:white;
}

#no{
    background:white;
    color:#ff3366;
    position:absolute;
}

</style>
</head>

<body>

<h1>Will You Be My Girlfriend Forever? ❤️</h1>

<button id="yes" onclick="yesClicked()">Yes ❤️</button>
<button id="no">No 😢</button>

<p id="message"></p>

<script>

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", moveButton);

function moveButton(){
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

function yesClicked(){
    document.getElementById("message").innerHTML =
    "Yay!!! I love you so much ❤️";
}

</script>

</body>
</html>
